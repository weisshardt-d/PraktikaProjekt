<!-- Aufgabe 2: Erstelle hier ein Eingabefeld und einen Senden-Button -->
<!-- Hinweis: Verwende ein <form> Element mit (submit)="onSubmit($event)" -->
<!-- Das Form Element braucht: class="row" -->
<form class="row" (submit)="onSubmit($event)">
  <!-- Dein Code hier: -->
  <!-- 1. <input> Element mit: -->
  <!--    - type="text" -->
  <!--    - class="input" -->
  <!--    - placeholder="Nachricht eingeben…" -->
  <!--    - [(ngModel)]="text" (Two-Way Data Binding zur 'text' Variable) -->
  <!--    - name="msg" (benötigt für ngModel) -->
  <!--    - [disabled]="disabled" (deaktiviert während des Ladens) -->
  <!--    📝 Aufgabe 5: Füge maxlength="500" hinzu um die Eingabe zu limitieren -->
  <input class="input" type="text" placeholder="Nachricht eingeben…" [(ngModel)]="text" name="msg" [disabled]="disabled" maxlength="500" />
  
  <!-- 2. <button> Element mit: -->
  <!--    - type="submit" -->
  <!--    - class="btn" -->
  <!--    - [disabled]="disabled" -->
  <!--    - Text: "Senden" -->
  <button class="btn" type="submit" [disabled]="disabled">Senden</button>
</form>

<!-- Aufgabe 5: Erstelle hier einen Zeichenzähler -->
<!-- Zeige "Zeichen: X/500" an, wobei X die aktuelle Länge ist -->
<!-- Hinweis: Verwende {{ text.length }} um die Anzahl der Zeichen zu zeigen -->
<!-- CSS-Klasse: "small" für kleinere Schrift -->
<!-- Beispiel: <div class="small">Zeichen: {{ text.length }}/500</div> -->
<div class="small">Zeichen: {{ text.length }}/500</div>
