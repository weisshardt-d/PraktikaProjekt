<div class="chat" id="chat">
  <!-- Aufgabe 1: Zeige hier alle Nachrichten aus dem messages Array an -->
  <!-- Hinweis: Die @for Schleife iteriert über messages, jede Nachricht heißt 'm' -->
  <!-- Jede Nachricht (m) hat: m.from ('user' oder 'llm') und m.text (der Text) -->
  <!-- Erstelle ein <div> mit class="msg" und zeige m.text darin an -->
  @for (m of messages; track m) {
    <!-- Dein Code hier: <div class="msg">{{ m.text }}</div> -->
    <!-- Aufgabe 3: Styling mit @if/@else -->
    @if (m.from === 'user') {
      <div class="msg user">{{ m.text }}</div>
    } @else {
      <div class="msg llm">{{ m.text }}</div>
    }
  }
  @if (loading) {
    <div class="msg llm">… denkt nach</div>
  }
</div>

<!-- Aufgabe 4: Erstelle hier einen "Chat löschen" Button -->
<!-- Hinweis: Der Button soll das clear-Event auslösen -->
<!-- Verwende: (click)="clear.emit()" -->
<!-- CSS-Klasse: "btn" und zusätzlich "small" für kleinere Darstellung -->
<!-- Beispiel: <button class="btn small" (click)="clear.emit()">Chat löschen</button> -->
<button class="btn small" (click)="clear.emit()">Chat löschen</button>
